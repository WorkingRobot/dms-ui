name: Build Docker Web Image
on: push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: WorkingRobot/dms-ui

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=edge
            type=ref,event=branch

      # NOTE: actions/attest-build-provenance is intentionally omitted.
      # GitHub Artifact Attestations are unavailable for private repos owned
      # by a user account (this repo is private). Re-add the attest step if
      # the repo is ever made public or moved under an organization.
      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
