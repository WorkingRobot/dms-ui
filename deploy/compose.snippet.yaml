# Example compose service for dms-ui. Add it alongside your
# docker-mailserver service (review before applying).
#
# dms-ui shells out to `docker exec <mail container> setup ...`, so it needs
# the Docker socket. It has no built-in auth and MUST stay behind an
# authenticating reverse proxy (see traefik.example.yml).

  dms-ui:
    image: ghcr.io/workingrobot/dms-ui:edge
    restart: unless-stopped
    environment:
      # Name of your docker-mailserver container.
      - MAIL_CONTAINER=mailserver
      # Authentik's forward-auth sets X-authentik-email; see traefik.example.yml.
      - PROXY_EMAIL_HEADER=X-authentik-email
    volumes:
      # Read-write socket: required to `docker exec` into the mail container.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mailserver
